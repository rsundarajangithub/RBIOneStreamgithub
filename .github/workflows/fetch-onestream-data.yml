name: Fetch OneStream Data

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch brucetest from OneStream
        env:
          OS_BASE_URL: https://rbi-test.onestreamcloud.com
          OS_ENDPOINT: https://rbi-test.onestreamcloud.com/onestreamapi/api/DataProvider/GetAdoDataSetForAdapter
          OS_API_VERSION: '5.2.0'
          OS_PAT: ${{ secrets.ONESTREAM_PAT }}
          OS_APP_NAME: OneStream_Prod_0128
          OS_ADAPTER: SQLAdapter
        run: |
          set -euo pipefail
          mkdir -p data

          # Pull every brucetest row in one shot.  ~388K rows is fine for
          # the SqlAdapter response payload; if it ever paginates we'll
          # split by segment.
          SQL="SELECT segment, section, dashboard_label, entity, scenario, time_member, os_account, flow, origin, intercomp, ud1, ud2, ud3, ud4, ud5, ud6, ud7, ud8, amount, value_scale, extracted_at FROM brucetest"

          BODY=$(jq -n \
            --arg app     "$OS_APP_NAME" \
            --arg adapter "$OS_ADAPTER"  \
            --arg sql     "$SQL"         \
            --arg baseUrl "$OS_BASE_URL" \
            '{
              BaseWebServerUrl: $baseUrl,
              ApplicationName:  $app,
              AdapterName:      $adapter,
              ParameterValues:  ("<SqlQuery>" + $sql + "</SqlQuery>")
            }')

          echo "Fetching brucetest..."
          HTTP_CODE=$(curl -s -o data/brucetest_export.json -w "%{http_code}" \
            -X POST "${OS_ENDPOINT}?api-version=${OS_API_VERSION}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OS_PAT}" \
            -d "$BODY")

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::brucetest fetch returned HTTP ${HTTP_CODE}"
            head -c 1000 data/brucetest_export.json || true
            exit 1
          fi

          ROWS=$(jq '[.Tables[0].Rows | length] | add' data/brucetest_export.json)
          echo "OK: brucetest_export.json has ${ROWS} rows"

      - name: Transform brucetest -> dashboard.json
        run: |
          set -euo pipefail
          # pipefail ensures python's exit code propagates through `tee`.
          python scripts/transform.py 2>&1 | tee transform.log
          echo "--- data/ contents after transform ---"
          ls -la data/
          test -s data/dashboard.json || { echo "::error::data/dashboard.json missing or empty"; exit 1; }
          test -s data/meta.json      || { echo "::error::data/meta.json missing or empty"; exit 1; }

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: transform-debug
          path: |
            transform.log
            data/brucetest_export.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit and push data
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only stage what the dashboard consumes.  brucetest_export.json
          # is .gitignored (large + raw cube data).
          git add data/dashboard.json data/meta.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh dashboard.json $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
