    /* ======================================= */
    /* === TRENDS PANEL                     === */
    /* ======================================= */
    function renderTrends() {
      const seg = getSegment();
      if (!seg) { qs('#tab-trends').innerHTML = '<p style="padding:40px;color:var(--text-muted)">No trend data available.</p>'; return; }

      const trendMetrics = seg.kpis.summaryCards.filter(c => c.history && c.history.length > 0);
      if (!trendMetrics.length) {
        qs('#tab-trends').innerHTML = '<p style="padding:40px;color:var(--text-muted)">No trend data available for this segment.</p>';
        return;
      }

      const allLabels = data.meta.periods; /* P1-P12 */
      const currentPeriodIdx = 2; /* P3 = index 2 (0-based) */
      const cyLen = trendMetrics[0].history.length; /* should be 3 */

      /* PY: generate full 12-point simulated prior year data */
      function priorYearHistory(history) {
        const seed = [];
        for (let i = 0; i < 12; i++) {
          if (i < history.length) {
            seed.push(history[i] * (0.82 + ((i * 17 + 7) % 13) / 162));
          } else {
            const lastCY = history[history.length - 1];
            const drift = 1 + (i - history.length) * 0.008;
            seed.push(lastCY * (0.84 + ((i * 13 + 3) % 11) / 137) * drift);
          }
        }
        return seed;
      }

      /* LE: full-year plan set at start of year, exists for ALL 12 periods */
      function leHistory(history) {
        const last = history[history.length - 1];
        const trend = history.length >= 2 ? (history[history.length - 1] - history[0]) / (history.length - 1) : 0;
        const forecast = [];
        for (let i = 0; i < 12; i++) {
          /* Simulated LE plan: smooth trend projection with minor wobble */
          const base = history[0] + trend * i * 0.9;
          const wobble = 1 + (((i * 11 + 5) % 9) - 4) / 220;
          forecast.push(base * wobble || last * (0.95 + ((i * 7) % 11) / 180));
        }
        return forecast;
      }
      /* Budget: full-year plan set at start of year, ~5-8% below LE typically */
      function budgetHistory(history) {
        const le = leHistory(history);
        return le.map((v, i) => v * (0.93 + ((i * 5 + 2) % 7) / 160));
      }

      const percentMetrics = trendMetrics.filter(m => m.valueKind === 'percent');

      function renderOverlayChart(metrics, title, format, idx) {
        if (!metrics.length) return '';
        const seriesColors = ['#5E2751', '#D6001C', '#FF6A39', '#93272C', '#5D5E5D'];
        return `
          <div class="trend-section">
            <div class="trend-chart-wrap">
              <div class="sl" style="padding:0 0 8px">${esc(title)}</div>
              <canvas id="trend-overlay-${idx}"></canvas>
              <div class="trend-legend">
                ${metrics.map((m, mi) => `
                  <div class="trend-legend-item">
                    <span class="trend-legend-dot" style="background:${seriesColors[mi % seriesColors.length]}"></span>
                    <span>${esc(m.label)} (CY Actual P1-P3)</span>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      }

      const individualCharts = trendMetrics.map((m, i) => `
        <div class="trend-section">
          <div class="trend-chart-wrap">
            <div class="sl" style="padding:0 0 8px">${esc(m.label)}</div>
            <canvas id="trend-canvas-${i}"></canvas>
            <div class="trend-legend">
              <div class="trend-legend-item">
                <span class="trend-legend-dot" style="background:#D6001C"></span>
                <span>CY Actual (P1-P3)</span>
              </div>
              <div class="trend-legend-item">
                <span class="trend-legend-dot" style="background:#5E2751"></span>
                <span>LE (Full Year)</span>
              </div>
              <div class="trend-legend-item">
                <span class="trend-legend-dot" style="background:#5E2751;opacity:0.5;border:1px dashed #5E2751"></span>
                <span>Budget (Full Year)</span>
              </div>
              <div class="trend-legend-item">
                <span class="trend-legend-dot" style="background:#5D5E5D"></span>
                <span>PY Actual (Full Year)</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');

      let overlayIdx = 0;
      qs('#tab-trends').innerHTML = `
        <div class="kicker">Performance Trends (CY vs PY) &mdash; CY Actuals through P3</div>
        ${percentMetrics.length > 1 ? renderOverlayChart(percentMetrics, 'Sales & Traffic Metrics (%)', 'percent', overlayIdx++) : ''}
        <div class="trend-grid">${individualCharts}</div>
      `;

      requestAnimationFrame(() => {
        const seriesColors = ['#5E2751', '#D6001C', '#FF6A39', '#93272C', '#5D5E5D'];

        if (percentMetrics.length > 1) {
          const canvas = qs('#trend-overlay-0');
          if (canvas) {
            const series = percentMetrics.map((m, mi) => ({
              values: m.history, color: seriesColors[mi % seriesColors.length]
            }));
            drawTrendLine(canvas, series, allLabels.slice(0, cyLen), { format: 'percent', currentPeriodIdx: currentPeriodIdx });
          }
        }

        trendMetrics.forEach((m, i) => {
          const canvas = qs(`#trend-canvas-${i}`);
          if (canvas) {
            const pyData = priorYearHistory(m.history);
            const leData = leHistory(m.history);
            const budgetData = budgetHistory(m.history);
            drawTrendLine(canvas, [
              { values: leData,    color: '#5E2751' },
              { values: budgetData,color: '#5E2751', dashed: true },
              { values: pyData,    color: '#5D5E5D' },
              { values: m.history, color: '#D6001C' } /* Actual: only P1-P3 */
            ], allLabels, { format: m.valueKind, currentPeriodIdx: currentPeriodIdx });
          }
        });
      });
    }

    /* ======================================= */
    /* === YoY PANEL                        === */
    /* ======================================= */
    function renderYoY() {
      const seg = getSegment();
      if (!seg || !seg.yoyData) { qs('#tab-yoy').innerHTML = '<p style="padding:40px;color:var(--text-muted)">No YoY data available.</p>'; return; }
      const yoy = seg.yoyData;

      const enriched = yoy.metrics.map(m => {
        const delta = m.current - m.prior;
        const pctChange = m.prior !== 0 ? delta / Math.abs(m.prior) : 0;
        return { ...m, delta, pctChange };
      });
      const maxAbsChange = Math.max(...enriched.map(e => Math.abs(e.pctChange)), 0.01);

      const rows = enriched.map(m => {
        const barWidth = Math.round((Math.abs(m.pctChange) / maxAbsChange) * 100);
        const barColor = m.delta >= 0 ? 'var(--beat)' : 'var(--miss)';
        const changeStr = m.format === 'count'
          ? (m.delta >= 0 ? `+${m.delta}` : `(${Math.abs(m.delta)})`)
          : (m.pctChange < 0 ? `(${Math.abs(m.pctChange * 100).toFixed(1)}%)` : `+${(m.pctChange * 100).toFixed(1)}%`);
        const changeCls = m.delta >= 0 ? 'pos' : 'neg';
        return `<tr>
          <td style="font-weight:700">${esc(m.label)}</td>
          <td style="color:var(--text-muted)">${fmtVal(m.prior, m.format)}</td>
          <td style="font-weight:700">${fmtVal(m.current, m.format)}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
              <div style="width:100px;height:8px;background:var(--border-light);border-radius:4px;overflow:hidden">
                <div style="width:${barWidth}%;height:100%;background:${barColor};border-radius:4px"></div>
              </div>
              <span class="yoy-change ${changeCls}" style="min-width:60px;text-align:right">${varArrow(m.delta)}${changeStr}</span>
            </div>
          </td>
        </tr>`;
      }).join('');

      qs('#tab-yoy').innerHTML = `
        <div class="kicker">Year-over-Year Comparison</div>
        <div class="sec">
          <div class="band">${yoy.currentYear} vs ${yoy.priorYear}</div>
          <div class="box"><div class="wrap">
            <table class="comp-table">
              <thead><tr>
                <th style="text-align:left">Metric</th>
                <th style="text-align:right">${yoy.priorYear}</th>
                <th style="text-align:right">${yoy.currentYear}</th>
                <th style="text-align:right">Change</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div></div>
        </div>
      `;
    }

    /* --- Sorting --- */
    function bindSortHeaders() {
      qsa('#fin-table th[data-sort]').forEach(th => {
        if (th.dataset.sort === 'label') return;
        th.onclick = () => {
          if (state.sortColumn === th.dataset.sort) {
            state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
          } else {
            state.sortColumn = th.dataset.sort;
            state.sortDir = 'desc';
          }
          renderFinancials();
          bindSortHeaders();
        };
      });
    }

    /* --- Comparison toggle --- */
    function bindCompareToggle() {
      qsa('#compare-toggle [data-cmp]').forEach(btn => {
        btn.onclick = () => {
          state.compareMode = btn.dataset.cmp;
          qsa('#compare-toggle [data-cmp]').forEach(b => b.classList.toggle('a', b.dataset.cmp === state.compareMode));
          renderAll();
        };
      });
    }
    bindCompareToggle();

    /* --- Events --- */
    function bindEvents() {
      qsa('[data-driver]').forEach(btn => {
        if (btn.classList.contains('driver-toggle')) {
          btn.onclick = () => {
            const detail = qs(`#driver-${btn.dataset.driver}`);
            const isOpen = btn.getAttribute('aria-expanded') === 'true';
            btn.setAttribute('aria-expanded', String(!isOpen));
            if (detail) detail.classList.toggle('o', !isOpen);
          };
        }
      });

      qsa('#tab-kpis .card[data-card-idx]').forEach(card => {
        card.onclick = () => {
          const idx = parseInt(card.dataset.cardIdx);
          state.drillTarget = state.drillTarget === idx ? null : idx;
          renderKpisPanel();
          bindEvents();
        };
      });

      const dc = qs('#drill-close');
      if (dc) dc.onclick = () => { state.drillTarget = null; renderKpisPanel(); bindEvents(); };

      qsa('.drill-panel [data-kv]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          state.trackerView = btn.dataset.kv;
          renderKpisPanel();
          bindEvents();
        };
      });

      bindSortHeaders();

      // Collapsible P&L sub-rows
      qsa('.toggle-arrow[data-toggle-parent]').forEach(arrow => {
        arrow.onclick = (e) => {
          e.stopPropagation();
          const parentKey = arrow.dataset.toggleParent;
          const isExpanded = arrow.classList.contains('expanded');
          arrow.classList.toggle('expanded', !isExpanded);
          arrow.innerHTML = isExpanded ? '&#9654;' : '&#9660;';
          qsa(`#fin-table tr[data-parent="${parentKey}"]`).forEach(row => {
            row.classList.toggle('collapsed', isExpanded);
          });
        };
      });
    }

    /* --- Render All --- */
    function renderAll() {
      applyBrandColor();
      renderBrandNav();
      renderHeader();
      if (typeof updatePeriodContext === 'function') updatePeriodContext();
      renderPulseBanner();
      renderExecutiveSummary();
      renderHeadline();
      renderTabs();

      if (state.activeBrand === 'consolidated') {
        renderConsolidated();
        renderFinancials();
      } else {
        renderKpisPanel();
        renderFinancials();
        renderTrends();
        renderYoY();
      }

      syncPanels();
      bindEvents();
    }

    /* --- OneStream Status UI --- */
    const osDot = qs('#os-status-dot');
    const osLabel = qs('#os-status-label');
    const osBtn = qs('#os-refresh-btn');
    const osBanner = qs('#os-banner');

    function updateOsStatus(info) {
      if (osDot) {
        osDot.className = 'os-status-dot ' + info.status;
      }
      if (osLabel) {
        const labels = {
          disconnected: 'OneStream',
          connecting: 'Syncing\u2026',
          connected: 'Connected',
          error: 'Error'
        };
        osLabel.textContent = labels[info.status] || 'OneStream';
        if (info.status === 'connected' && info.lastRefresh) {
          const t = info.lastRefresh;
          const ts = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          osLabel.textContent = `Updated \u00b7 ${ts}`;
        }
      }
      if (osBtn) {
        osBtn.disabled = info.status === 'connecting';
      }
      if (osBanner) {
        if (info.status === 'error' && info.error) {
          osBanner.className = 'os-banner error visible';
          osBanner.textContent = `OneStream: ${info.error}`;
        } else if (info.status === 'connected') {
          osBanner.className = 'os-banner success visible';
          osBanner.textContent = `Data refreshed from OneStream at ${info.lastRefresh.toLocaleTimeString()}`;
          setTimeout(() => { osBanner.className = 'os-banner'; }, 4000);
        } else {
          osBanner.className = 'os-banner';
        }
      }
    }

    if (window.OneStreamAPI) {
      window.OneStreamAPI.onStatusChange(updateOsStatus);
    }

    let _autoRefreshTimer = null;
    let _refreshInProgress = false;

    async function refreshFromOneStream() {
      if (!window.OneStreamAPI) return;
      if (_refreshInProgress) return;
      _refreshInProgress = true;
      try {
        const allData = await window.OneStreamAPI.fetchAllSegments(true);
        console.log('OneStream data loaded:', Object.keys(allData).map(k => `${k}: ${allData[k].length} rows`));
        window._osRawData = allData;

        /* Merge API data into dashboard model and re-render */
        if (window.OneStreamTransform && Object.keys(allData).some(k => allData[k].length)) {
          const report = window.OneStreamTransform.mergeAll(data, allData);
          console.log('OneStream merge report:', report);

          /* Update header source line */
          qs('#hdr-timestamp').textContent = 'Source: OneStream';
          qs('#site-footer').textContent = 'Source: OneStream';

          renderAll();
        }
      } catch (err) {
        console.error('OneStream refresh failed:', err);
      } finally {
        _refreshInProgress = false;
      }
    }

    if (osBtn) {
      osBtn.style.display = 'none';
    }

    /* --- Init --- */
    renderPeriodSelect();
    renderAll();

    /* Auto-connect to OneStream on page load */
    refreshFromOneStream();
    _autoRefreshTimer = setInterval(() => { refreshFromOneStream(); }, 120000);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') refreshFromOneStream();
    });

    /* --- Expose actions --- */
    window.dashboardActions = {
      setTab(id) { state.activeTab = id; syncPanels(); },
      setTrackerView(id) { state.trackerView = id; renderKpisPanel(); bindEvents(); },
      refreshOneStream: refreshFromOneStream,
      getOsData: () => window._osRawData || {}
    };
    window.DASH_BUILD = DASH_BUILD;
  })();
  </script>
</body>
</html>
