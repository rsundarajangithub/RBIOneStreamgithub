  <script>
  (() => {
    'use strict';
    const DASH_BUILD = 'build dbb8c07';

    /* --- Data --- */
    const data = JSON.parse(document.getElementById('dashboard-data').textContent);
    const qs = (s) => document.querySelector(s);
    const qsa = (s) => Array.from(document.querySelectorAll(s));

    /* --- Zero out embedded dummy data so dashboard starts clean --- */
    /* All values will be populated from OneStream on refresh        */
    (function clearDummyData() {
      for (const [segId, seg] of Object.entries(data.segments)) {
        seg.fzSales = 0;

        /* Full-year outlook */
        if (seg.fullYearData) {
          seg.fullYearData.ytdActual = 0;
          seg.fullYearData.remainingLE = 0;
          seg.fullYearData.fullYearLE = 0;
          seg.fullYearData.fullYearBudget = 0;
        }

        /* Headline variance */
        if (seg.headline && seg.headline.items) {
          seg.headline.items.forEach(h => { h.variance = 0; });
          seg.headline.note = '';
        }

        /* Summary cards */
        if (seg.kpis && seg.kpis.summaryCards) {
          seg.kpis.summaryCards.forEach(c => {
            c.value = 0;
            c.badgeValue = 0;
            c.note = '';
            if (c.history) c.history = c.history.map(() => 0);
          });
        }

        /* KPI tracker rows */
        if (seg.kpis && seg.kpis.tracker && seg.kpis.tracker.rows) {
          for (const row of seg.kpis.tracker.rows) {
            for (const view of ['march', 'q1', 'ytd']) {
              if (row[view]) {
                row[view].actual = 0;
                row[view].le = 0;
                row[view].budget = 0;
                row[view].py = 0;
              }
            }
            /* Detail section sub-rows */
            if (row.detailSections) {
              for (const sec of row.detailSections) {
                if (sec.rows) {
                  for (const dr of sec.rows) {
                    for (const view of ['march', 'q1', 'ytd']) {
                      if (dr[view]) {
                        dr[view].actual = 0;
                        dr[view].le = 0;
                        dr[view].budget = 0;
                        dr[view].py = 0;
                      }
                    }
                  }
                }
              }
            }
          }
        }

        /* Drivers */
        if (seg.kpis && seg.kpis.drivers && seg.kpis.drivers.items) {
          seg.kpis.drivers.items.forEach(d => { d.value = 0; });
        }

        /* Flowthrough */
        if (seg.kpis && seg.kpis.flowthrough && seg.kpis.flowthrough.rows) {
          seg.kpis.flowthrough.rows.forEach(r => { r.yoy = 0; if (r.flowthrough != null) r.flowthrough = 0; });
        }

        /* Financial P&L rows */
        if (seg.financials && seg.financials.rows) {
          seg.financials.rows.forEach(r => {
            r.actualPlan = 0;
            r.lePlan = 0;
            r.budget = 0;
            r.pyActual = 0;
          });
        }

        /* YoY metrics */
        if (seg.yoyData && seg.yoyData.metrics) {
          seg.yoyData.metrics.forEach(m => { m.current = 0; m.prior = 0; });
        }

        /* FX decomposition (INTL) */
        if (seg.fxDecomp) {
          for (const k of Object.keys(seg.fxDecomp)) {
            seg.fxDecomp[k].organic = 0;
            seg.fxDecomp[k].fx = 0;
            seg.fxDecomp[k].reported = 0;
          }
        }
      }

      data.meta.dataSource = 'OneStream (connecting\u2026)';
    })();

    /* --- State --- */
    const state = {
      activeBrand: 'consolidated',
      activeTab: 'consolidated',
      trackerView: 'march',
      compareMode: 'le',
      sortColumn: null,
      sortDir: 'asc',
      drillTarget: null,
    };

    /* --- Utilities --- */
    function formatCurrency(v, dec = 1, sign = false, sfx = 'M') {
      if (v == null) return '-';
      const a = Math.abs(v).toFixed(dec);
      if (v < 0) return `($${a}${sfx})`;
      if (sign && v > 0) return `+$${a}${sfx}`;
      return `$${a}${sfx}`;
    }
    function formatPercent(v, dec = 1, sign = false) {
      if (v == null) return '-';
      const a = Math.abs(v * 100).toFixed(dec);
      if (v < 0) return `(${a}%)`;
      if (sign && v > 0) return `+${a}%`;
      return `${a}%`;
    }
    function formatBps(v) {
      if (v == null) return '-';
      const a = Math.round(Math.abs(v * 10000));
      if (v < 0) return `(${a}bps)`;
      if (v > 0) return `+${a}bps`;
      return '0bps';
    }
    function formatCount(v, sign = false) {
      if (v == null) return '-';
      const r = Math.round(v);
      if (r < 0) return `(${Math.abs(r)})`;
      if (sign && r > 0) return `+${r}`;
      return `${r}`;
    }
    function fmtVal(v, kind, opts = {}) {
      let out;
      if (kind === 'currency' || kind === 'currencyTable') out = formatCurrency(v, opts.decimals ?? 1, opts.forceSign, opts.suffix ?? 'M');
      else if (kind === 'percent' || kind === 'yoy') out = formatPercent(v, opts.decimals ?? 1, opts.forceSign);
      else if (kind === 'bps') out = formatBps(v);
      else if (kind === 'count') out = formatCount(v, opts.forceSign);
      else out = v ?? '-';
      return out;
    }
    /* Triangle arrows removed per design: parenthetical notation signals negatives. */
    function varArrow(v) {
      return '';
    }
    function badgeCls(v, kind = '') {
      const b = kind === 'bps' ? 'bd-bps' : 'bd';
      return v > 0 ? `${b} u` : v < 0 ? `${b} d` : `${b} n`;
    }
    function tileBadgeCls(v) { return v > 0 ? 'bd-tile u' : v < 0 ? 'bd-tile d' : 'bd-tile n'; }
    function headlineCls(v) { return v > 0 ? 'hp beat' : v < 0 ? 'hp miss' : 'hp'; }
    function esc(v) {
      return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function emphasize(t) {
      return esc(t).replace(/(\(\$\d+(?:\.\d+)?M\)|\+\$\d+(?:\.\d+)?M|\$\d+(?:\.\d+)?M|\(\d+(?:\.\d+)?%\)|\+\d+(?:\.\d+)?%|\d+(?:\.\d+)?%)/g, '<strong>$1</strong>');
    }
    function ragClass(card) {
      if (!card.rag) return '';
      // Try achievement-based RAG: actual / target
      const seg = getSegment();
      if (seg) {
        const trackerRow = seg.kpis.tracker.rows.find(r =>
          r.label.toLowerCase().includes(card.label.toLowerCase().replace(/[()%]/g, '').trim())
        );
        if (trackerRow) {
          const d = trackerRow[state.trackerView] || trackerRow.march || {};
          const target = getCompareVal(d);
          if (target && target !== 0) {
            const achievement = d.actual / target;
            if (achievement >= 0.95) return 'rag-green';
            if (achievement >= 0.65) return 'rag-amber';
            return 'rag-red';
          }
        }
      }
      // Fallback to absolute thresholds
      const v = card.value;
      if (v >= card.rag.green) return 'rag-green';
      if (v >= card.rag.amber) return 'rag-amber';
      return 'rag-red';
    }
    function compareLabel() {
      return state.compareMode === 'le' ? 'LE' : state.compareMode === 'budget' ? 'Budget' : 'PY';
    }
    function compareLabelShort() {
      return state.compareMode === 'le' ? 'LE' : state.compareMode === 'budget' ? 'Bgt' : 'PY';
    }
    function getCompareVal(d) {
      if (!d) return null;
      if (state.compareMode === 'le') return d.le;
      if (state.compareMode === 'budget') return d.budget;
      if (state.compareMode === 'py') return d.py;
      return d.le;
    }
    function findTrackerRowForCard(seg, card) {
      if (!seg || !card || !seg.kpis || !seg.kpis.tracker) return null;
      const rows = seg.kpis.tracker.rows || [];
      const cardKey = card.label.toLowerCase().replace(/[^a-z0-9]/g, '');
      return rows.find(r => r.id === cardKey)
        || rows.find(r => {
          const lbl = r.label.toLowerCase();
          const cardLbl = card.label.toLowerCase().replace(/[()%]/g, '').trim();
          return cardLbl && lbl.includes(cardLbl);
        }) || null;
    }
    function getTrackerPeriodData(row) {
      if (!row) return null;
      return row[state.trackerView] || row.march || row.q1 || row.ytd || null;
    }
    function computeVar(d) {
      if (!d || d.actual == null) return null;
      const comp = getCompareVal(d);
      if (comp == null) return null;
      return d.actual - comp;
    }
    function getBrand(id) { return data.brands.find(b => b.id === id); }
    function getSegment() { return data.segments[state.activeBrand]; }
    function brandColor() {
      const b = getBrand(state.activeBrand);
      return b ? b.color : data.brands[0].color;
    }

    /* --- Canvas Chart Engine --- */
    function dpr() { return window.devicePixelRatio || 1; }

    function initCanvas(canvas, w, h) {
      const r = dpr();
      canvas.width = w * r;
      canvas.height = h * r;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(r, r);
      return ctx;
    }

    function drawSparkline(canvas, values, opts = {}) {
      if (!values || values.length < 2) return;
      const w = opts.width || canvas.clientWidth || 160;
      const h = opts.height || canvas.clientHeight || 36;
      const ctx = initCanvas(canvas, w, h);
      const color = opts.color || brandColor();
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const pad = 4;
      const step = (w - pad * 2) / (values.length - 1);

      const points = values.map((v, i) => ({
        x: pad + i * step,
        y: h - pad - ((v - min) / range) * (h - pad * 2)
      }));

      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
      ctx.lineTo(points[points.length - 1].x, h);
      ctx.lineTo(points[0].x, h);
      ctx.closePath();
      ctx.fillStyle = color + '15';
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.stroke();

      const last = points[points.length - 1];
      ctx.beginPath();
      ctx.arc(last.x, last.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawBarChart(canvas, labels, series, opts = {}) {
      const w = opts.width || canvas.clientWidth || 400;
      const h = opts.height || canvas.clientHeight || 200;
      const ctx = initCanvas(canvas, w, h);
      const textColor = '#8E8E8E';
      const gridColor = '#EBEBEB';

      const padL = 60, padR = 20, padT = 20, padB = 40;
      const chartW = w - padL - padR;
      const chartH = h - padT - padB;

      const allVals = series.flatMap(s => s.values);
      const maxV = Math.max(...allVals, 0);
      const minV = Math.min(...allVals, 0);
      const range = maxV - minV || 1;

      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= 4; i++) {
        const y = padT + (chartH / 4) * i;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
        const val = maxV - (range / 4) * i;
        ctx.fillStyle = textColor;
        ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(formatCurrency(val, 0, false, ''), padL - 8, y + 4);
      }

      const groupW = chartW / labels.length;
      const barW = Math.min(groupW / (series.length + 1), 24);
      const barGap = 3;

      series.forEach((s, si) => {
        s.values.forEach((v, vi) => {
          const x = padL + vi * groupW + (groupW - series.length * (barW + barGap)) / 2 + si * (barW + barGap);
          const barH = (Math.abs(v) / range) * chartH;
          const zeroY = padT + (maxV / range) * chartH;
          const y = v >= 0 ? zeroY - barH : zeroY;
          ctx.fillStyle = (s.colors && s.colors[vi]) ? s.colors[vi] : s.color;
          ctx.beginPath();
          ctx.roundRect(x, y, barW, barH, [2, 2, 0, 0]);
          ctx.fill();
        });
      });

      ctx.fillStyle = textColor;
      ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif';
      ctx.textAlign = 'center';
      labels.forEach((l, i) => {
        ctx.fillText(l, padL + i * groupW + groupW / 2, h - 10);
      });
    }

    function drawTrendLine(canvas, seriesArr, labels, opts = {}) {
      const w = opts.width || canvas.clientWidth || 500;
      const h = opts.height || canvas.clientHeight || 200;
      const ctx = initCanvas(canvas, w, h);
      const textColor = '#8E8E8E';
      const gridColor = '#EBEBEB';
      const mutedColor = '#CCCCCC';
      const currentPeriodIdx = opts.currentPeriodIdx != null ? opts.currentPeriodIdx : labels.length - 1;

      const padL = 55, padR = 20, padT = 15, padB = 35;
      const chartW = w - padL - padR;
      const chartH = h - padT - padB;

      const allVals = seriesArr.flatMap(s => s.values);
      const max = Math.max(...allVals);
      const min = Math.min(...allVals);
      const range = max - min || 1;

      /* Forecast shading for P4+ */
      if (currentPeriodIdx < labels.length - 1) {
        const fcstX = padL + currentPeriodIdx * (chartW / (labels.length - 1));
        ctx.fillStyle = 'rgba(0,0,0,0.025)';
        ctx.fillRect(fcstX, padT, w - padR - fcstX, chartH);
        ctx.fillStyle = mutedColor;
        ctx.font = '10px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('LE / Forecast', fcstX + 6, padT + 12);
      }

      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= 4; i++) {
        const y = padT + (chartH / 4) * i;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
        const val = max - (range / 4) * i;
        ctx.fillStyle = textColor;
        ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif';
        ctx.textAlign = 'right';
        const formatted = opts.format === 'percent' ? formatPercent(val) : opts.format === 'count' ? formatCount(val) : formatCurrency(val, 1, false, '');
        ctx.fillText(formatted, padL - 8, y + 4);
      }

      ctx.textAlign = 'center';
      const step = chartW / (labels.length - 1);
      labels.forEach((l, i) => {
        ctx.fillStyle = i <= currentPeriodIdx ? textColor : mutedColor;
        ctx.font = i <= currentPeriodIdx ? '11px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' : 'italic 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif';
        ctx.fillText(l, padL + i * step, h - 10);
      });

      seriesArr.forEach(s => {
        const pts = s.values.map((v, i) => ({
          x: padL + i * step,
          y: padT + ((max - v) / range) * chartH
        }));

        /* Draw solid line for actual data points */
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.setLineDash(s.dashed ? [6, 4] : []);
        ctx.stroke();
        ctx.setLineDash([]);

        pts.forEach((p, i) => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctx.fillStyle = s.dashed ? (s.color + '80') : s.color;
          ctx.fill();
        });
      });
    }

    /* --- Brand color application --- */
    function applyBrandColor() {
      const b = getBrand(state.activeBrand);
      const color = b ? b.color : data.brands[0].color;
      document.documentElement.style.setProperty('--brand', color);
      document.documentElement.style.setProperty('--brand-secondary', b ? b.secondary : data.brands[0].secondary);
    }

    /* --- Period selector --- */
    function currentMonthLabel() {
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const raw = String(data?.meta?.currentPeriod || 'P3');
      const parsed = parseInt(raw.replace(/[^0-9]/g, ''), 10);
      const periodNum = Number.isFinite(parsed) && parsed >= 1 && parsed <= 12 ? parsed : 3;
      return monthNames[periodNum - 1];
    }
    function periodLabelFor(view) {
      if (view === 'march') return currentMonthLabel();
      if (view === 'q1') return 'Q1';
      if (view === 'ytd') return 'YTD';
      return view || '';
    }
    function updatePeriodContext() {
      const ctx = qs('#period-context');
      if (!ctx) return;
      ctx.innerHTML = `Showing <strong>${esc(periodLabelFor(state.trackerView))}</strong> vs <strong>${esc(compareLabel())}</strong>`;
    }
    function renderPeriodSelect() {
      const sel = qs('#period-select');
      /* Only show views that actually have data in the tracker JSON */
      const options = [
        { value: 'march', label: currentMonthLabel() },
        { value: 'q1',    label: 'Q1' },
        { value: 'ytd',   label: 'YTD' }
      ];
      sel.innerHTML = options.map(o =>
        `<option value="${o.value}" ${o.value === state.trackerView ? 'selected' : ''}>${o.label}</option>`
      ).join('');
      sel.onchange = () => {
        state.trackerView = sel.value;
        const wrap = qs('#period-wrap');
        if (wrap) {
          wrap.classList.remove('flashing');
          // force reflow to restart animation
          void wrap.offsetWidth;
          wrap.classList.add('flashing');
          setTimeout(() => wrap.classList.remove('flashing'), 800);
        }
        renderAll();
      };
      updatePeriodContext();
    }

    /* --- Brand Nav --- */
    function renderBrandNav() {
      qs('#brand-nav').innerHTML = data.brands.map(b =>
        `<button class="brand-btn ${b.id === state.activeBrand ? 'a' : ''}" data-brand="${b.id}">${esc(b.label)}</button>`
      ).join('');
      qsa('.brand-btn').forEach(btn => {
        btn.onclick = () => {
          state.activeBrand = btn.dataset.brand;
          state.drillTarget = null;
          applyBrandColor();
          if (state.activeBrand === 'consolidated') {
            state.activeTab = 'consolidated';
          } else {
            const seg = getSegment();
            if (seg && seg.tabs && seg.tabs.length) {
              state.activeTab = seg.tabs[0].id;
            }
          }
          renderAll();
        };
      });
    }

    /* --- Header --- */
    function formatTimestamp(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const h = d.getHours(); const m = d.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} ${h12}:${String(m).padStart(2,'0')} ${ampm}`;
    }
    function renderHeader() {
      const b = getBrand(state.activeBrand);
      qs('#site-title').textContent = state.activeBrand === 'consolidated'
        ? data.meta.title
        : `${b.label} | Flash Dashboard`;
      qs('#site-period').textContent = data.meta.periodLabel;
      const src = data.meta.dataSource || '';
      const srcText = src ? `Source: ${src}` : '';
      qs('#hdr-timestamp').textContent = srcText;
      const bs = qs('#build-stamp');
      if (bs) bs.textContent = DASH_BUILD;
      qs('#site-footer').textContent = srcText;
    }

    /* --- Portfolio Pulse Banner --- */
    function renderPulseBanner() {
      const banner = qs('#pulse-banner');
      if (state.activeBrand !== 'consolidated') {
        banner.style.display = 'none';
        return;
      }
      const segEntries = Object.entries(data.segments);
      let beating = 0;
      let total = segEntries.length;
      let worstName = '';
      let worstVal = Infinity;

      segEntries.forEach(([id, seg]) => {
        const aoiCard = seg.kpis.summaryCards.find(c => c.label === 'AOI');
        if (aoiCard) {
          // Period-aware variance: prefer tracker row for current trackerView + compareMode
          const aoiRow = findTrackerRowForCard(seg, aoiCard);
          const aoiD = getTrackerPeriodData(aoiRow);
          const bv = (aoiD && aoiD.actual != null) ? (computeVar(aoiD) || 0) : (aoiCard.badgeValue || 0);
          if (bv > 0) beating++;
          if (bv < worstVal) { worstVal = bv; worstName = getBrand(id).shortLabel + ' US&C'; }
        }
      });

      const missing = total - beating;
      const hasMiss = worstVal < 0;
      const worstStr = hasMiss ? `${worstName} is the laggard at ${formatCurrency(worstVal, 1, false)}` : '';
      const periodLbl = periodLabelFor(state.trackerView);
      const beatStr = `<span class="pulse-beat">${beating} of ${total}</span> segments beating ${esc(compareLabel())}`;
      const leadIn = `<strong>${esc(periodLbl)}:</strong> `;
      const story = hasMiss
        ? `${leadIn}${beatStr} &mdash; but <span class="pulse-highlight">${esc(worstStr)}</span> and needs attention.`
        : `${leadIn}${beatStr}. Portfolio is tracking healthy across the board.`;
      banner.classList.toggle('has-miss', hasMiss);
      banner.innerHTML = `<span class="pulse-kicker">Portfolio Pulse</span><span class="pulse-icon" aria-hidden="true"></span><span class="pulse-story">${story}</span>`;
      banner.style.display = 'flex';
    }

    function getAoiSnapshot(seg) {
      if (!seg || !seg.kpis || !seg.kpis.summaryCards) return { actual: 0, variance: 0 };
      const aoiCard = seg.kpis.summaryCards.find(c => c.label === 'AOI');
      if (!aoiCard) return { actual: 0, variance: 0 };
      const row = findTrackerRowForCard(seg, aoiCard);
      const d = getTrackerPeriodData(row);
      const actual = (d && d.actual != null) ? d.actual : (aoiCard.value || 0);
      const variance = (d && d.actual != null) ? (computeVar(d) || 0) : (aoiCard.badgeValue || 0);
      return { actual, variance };
    }

    function getDataAsOf(sourceRows, isConsol, activeBrandId) {
      const segmentIds = isConsol ? Object.keys(data.segments || {}) : [activeBrandId];
      let latestMs = null;
      for (const segId of segmentIds) {
        const rows = sourceRows[segId];
        if (!Array.isArray(rows)) continue;
        for (const r of rows) {
          const rawTs = r && (r.extracted_at || r.extractedat || r.extractedAt);
          if (!rawTs) continue;
          const ms = new Date(rawTs).getTime();
          if (Number.isFinite(ms) && (latestMs == null || ms > latestMs)) latestMs = ms;
        }
      }
      if (latestMs == null) return 'n/a';
      const dt = new Date(latestMs);
      return dt.toLocaleString([], { year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    /* --- Executive Summary Strip --- */
    function renderExecutiveSummary() {
      const container = qs('#exec-summary');
      if (!container) return;

      const segEntries = Object.entries(data.segments || {});
      const activeSeg = getSegment();
      const isConsol = state.activeBrand === 'consolidated';

      const sourceRows = window._osRawData || {};
      const loadedSegments = segEntries.filter(([id]) => Array.isArray(sourceRows[id]) && sourceRows[id].length > 0).length;
      const totalRows = segEntries.reduce((sum, [id]) => sum + ((sourceRows[id] && sourceRows[id].length) || 0), 0);

      let aoi = 0, aoiVar = 0, sss = 0, nrg = 0, beats = 0, sssCount = 0;

      if (isConsol) {
        for (const [, seg] of segEntries) {
          const snap = getAoiSnapshot(seg);
          aoi += snap.actual;
          aoiVar += snap.variance;
          if (snap.variance > 0) beats++;

          const sssCard = seg.kpis && seg.kpis.summaryCards && seg.kpis.summaryCards.find(c => c.label === 'SSS');
          if (sssCard) { sss += (sssCard.value || 0); sssCount++; }
          const nrgCard = seg.kpis && seg.kpis.summaryCards && seg.kpis.summaryCards.find(c => c.label === 'NRG');
          if (nrgCard) nrg += (nrgCard.value || 0);
        }
        sss = sssCount > 0 ? sss / sssCount : 0;
      } else if (activeSeg) {
        const snap = getAoiSnapshot(activeSeg);
        aoi = snap.actual;
        aoiVar = snap.variance;
        beats = snap.variance > 0 ? 1 : 0;
        const sssCard = activeSeg.kpis && activeSeg.kpis.summaryCards && activeSeg.kpis.summaryCards.find(c => c.label === 'SSS');
        const nrgCard = activeSeg.kpis && activeSeg.kpis.summaryCards && activeSeg.kpis.summaryCards.find(c => c.label === 'NRG');
        sss = sssCard ? (sssCard.value || 0) : 0;
        nrg = nrgCard ? (nrgCard.value || 0) : 0;
      }

      const beatDenominator = isConsol ? segEntries.length : 1;
      const confidenceText = loadedSegments === 0
        ? 'No live rows loaded yet. Showing fallback/cached values.'
        : `${loadedSegments}/${segEntries.length} segments loaded (${totalRows.toLocaleString()} rows)`;
      const confidenceClass = loadedSegments === 0 ? 'exec-confidence warn' : 'exec-confidence';
      const asOf = getDataAsOf(sourceRows, isConsol, state.activeBrand);

      const scopeLabel = isConsol ? 'Portfolio' : (getBrand(state.activeBrand)?.label || state.activeBrand);
      const cards = [
        { label: 'AOI Actual', value: fmtVal(aoi, 'currency'), sub: `${fmtVal(aoiVar, 'currency', { forceSign: true })} vs ${compareLabel()}` },
        { label: 'SSS', value: fmtVal(sss, 'percent'), sub: `${periodLabelFor(state.trackerView)} view` },
        { label: 'NRG', value: fmtVal(nrg, 'count'), sub: 'Net restaurants' },
        { label: 'Segments Beating', value: `${beats}/${beatDenominator}`, sub: `vs ${compareLabel()}` }
      ];

      container.innerHTML = `
        <div class="exec-summary-cards">
          ${cards.map(c => `
            <div class="exec-card">
              <div class="exec-card-label">${esc(c.label)}</div>
              <div class="exec-card-value">${esc(c.value)}</div>
              <div class="exec-card-sub">${esc(c.sub)}</div>
            </div>
          `).join('')}
        </div>
        <div class="exec-side">
          <div class="exec-context">${esc(scopeLabel)} • ${esc(periodLabelFor(state.trackerView))} • vs ${esc(compareLabel())}</div>
          <div class="${confidenceClass}">${esc(confidenceText)}</div>
          <div class="exec-confidence">Data as of ${esc(asOf)} • Source: ${esc(data.meta.dataSource || 'OneStream')}</div>
        </div>
      `;
    }

    /* --- Headline --- */
    function renderHeadline() {
      const banner = qs('#headline-banner');
      if (state.activeBrand === 'consolidated') {
        const items = [];
        // Build one chip per segment using period-aware AOI variance from tracker
        for (const [id, seg] of Object.entries(data.segments)) {
          const brand = getBrand(id);
          if (!brand) continue;
          const aoiCard = seg.kpis && seg.kpis.summaryCards && seg.kpis.summaryCards.find(c => c.label === 'AOI');
          const aoiRow = aoiCard ? findTrackerRowForCard(seg, aoiCard) : null;
          const aoiD = getTrackerPeriodData(aoiRow);
          let varVal = null;
          if (aoiD && aoiD.actual != null) {
            varVal = computeVar(aoiD);
          } else if (seg.headline && seg.headline.items && seg.headline.items.length) {
            varVal = seg.headline.items[0].variance;
          }
          items.push({
            label: brand.shortLabel,
            variance: varVal != null ? varVal : 0,
            color: brand.color
          });
        }
        const cmpLbl = compareLabel();
        const pieces = items.map(item => `
          <div class="eg">
            <span class="el" style="background:${item.color}">${esc(item.label)}</span>
            <span class="${headlineCls(item.variance)}">${varArrow(item.variance)}${fmtVal(item.variance, 'currency', { forceSign: true })} vs ${esc(cmpLbl)}</span>
          </div>
        `);
        const joined = [];
        pieces.forEach((p, i) => { joined.push(p); if (i < pieces.length - 1) joined.push('<div class="sep"></div>'); });
        joined.push('<span class="note">Illustrative dummy data | USD$ in M unless noted</span>');
        banner.innerHTML = joined.join('');
        banner.style.display = 'flex';
      } else {
        const seg = getSegment();
        if (!seg || !seg.headline) { banner.style.display = 'none'; return; }
        const cmpLbl = compareLabel();
        // Period-aware: recompute variance from AOI tracker row per item when possible
        const aoiCard = seg.kpis && seg.kpis.summaryCards && seg.kpis.summaryCards.find(c => c.label === 'AOI');
        const aoiRow = aoiCard ? findTrackerRowForCard(seg, aoiCard) : null;
        const aoiD = getTrackerPeriodData(aoiRow);
        const dynVar = (aoiD && aoiD.actual != null) ? computeVar(aoiD) : null;
        const pieces = seg.headline.items.map((item, idx) => {
          const v = (idx === 0 && dynVar != null) ? dynVar : item.variance;
          return `
          <div class="eg">
            <span class="el" style="background:${item.color}">${esc(item.label)}</span>
            <span class="${headlineCls(v)}">${varArrow(v)}${fmtVal(v, 'currency', { forceSign: true })} vs ${esc(cmpLbl)}</span>
          </div>
        `;
        });
        const joined = [];
        pieces.forEach((p, i) => { joined.push(p); if (i < pieces.length - 1) joined.push('<div class="sep"></div>'); });
        joined.push(`<span class="note">${esc(seg.headline.note)}</span>`);
        banner.innerHTML = joined.join('');
        banner.style.display = 'flex';
      }
    }

    /* --- Tabs --- */
    function renderTabs() {
      const nav = qs('#tab-nav');
      if (state.activeBrand === 'consolidated') {
        const consolTabs = [
          {id:'consolidated', label:'Portfolio Overview'},
          {id:'financials', label:'Financials'}
        ];
        nav.innerHTML = consolTabs.map(t =>
          `<button class="tb ${t.id === state.activeTab ? 'a' : ''}" data-tab="${t.id}">${esc(t.label)}</button>`
        ).join('');
      } else {
        const seg = getSegment();
        if (!seg) { nav.innerHTML = ''; return; }
        nav.innerHTML = seg.tabs.map(t =>
          `<button class="tb ${t.id === state.activeTab ? 'a' : ''}" data-tab="${t.id}">${esc(t.label)}</button>`
        ).join('');
      }
      qsa('#tab-nav .tb').forEach(btn => {
        btn.onclick = () => {
          state.activeTab = btn.dataset.tab;
          state.drillTarget = null;

      });
    }

    /* --- Panel sync --- */
    function syncPanels() {
      qsa('#tab-nav .tb').forEach(t => t.classList.toggle('a', t.dataset.tab === state.activeTab));
      const panelMap = { consolidated: 'tab-consolidated', kpis: 'tab-kpis', financials: 'tab-financials', trends: 'tab-trends', yoy: 'tab-yoy' };
      /* Clear any inline display/opacity leftover from exportPDF so class-based control works */
      qsa('.panel').forEach(p => { p.style.display = ''; p.style.opacity = ''; });
      qsa('.panel').forEach(p => p.classList.toggle('a', p.id === panelMap[state.activeTab]));
    }

    /* ======================================= */
    /* === HEATMAP MATRIX (consolidated)    === */
    /* ======================================= */
    function heatmapClass(varPct) {
      if (varPct == null || isNaN(varPct)) return 'hm-flat';
      if (varPct >= 0.05) return 'hm-strong-beat';
      if (varPct > 0) return 'hm-mild-beat';
      if (varPct === 0) return 'hm-flat';
      if (varPct > -0.05) return 'hm-mild-miss';
      return 'hm-strong-miss';
    }

    function renderHeatmap(segEntries) {
      const kpiKeys = ['SSS', 'SST', 'NRG', 'Unit %', 'SWSG', 'AOI', 'AOIG', 'AOI Margin'];
      const headerCells = kpiKeys.map(k => `<th>${esc(k)}</th>`).join('');
      const rows = segEntries.map(([id, seg]) => {
        const brand = getBrand(id);
        const cells = kpiKeys.map(k => {
          if (k === 'AOI Margin') {
            const aoiCard = seg.kpis.summaryCards.find(c => c.label === 'AOI');
            const fzSales = seg.fzSales || 0;
            if (!aoiCard || !fzSales) return '<td class="hm-flat" title="AOI Margin - no data">-</td>';
            const margin = aoiCard.value / fzSales;
            const tip = `${esc(brand.shortLabel)} - AOI Margin: ${formatPercent(margin, 1)}`;
            return `<td class="hm-flat" title="${tip}">${formatPercent(margin, 1)}</td>`;
          }
          const card = seg.kpis.summaryCards.find(c => c.label === k);
          if (!card) return `<td class="hm-flat" title="${esc(brand.shortLabel)} - ${esc(k)}: no data">-</td>`;

          // Resolve variance dynamically from the tracker based on active view + compareMode
          const trackerRow = findTrackerRowForCard(seg, card);
          const d = getTrackerPeriodData(trackerRow);
          let varVal = null;
          let compVal = null;
          let varFormat = null;
          if (d && d.actual != null) {
            compVal = getCompareVal(d);
            varVal = computeVar(d);
            varFormat = trackerRow.format || card.valueKind;
          } else if (card.badgeValue != null) {
            // Fallback to hardcoded badge (e.g. AOIG with no tracker row)
            varVal = card.badgeValue;
            varFormat = card.badgeKind || card.valueKind;
          }

          if (varVal == null) {
            return `<td class="hm-flat" title="${esc(brand.shortLabel)} - ${esc(k)}: no data">-</td>`;
          }

          // Normalize variance magnitude to a percent for coloring
          let varPct = 0;
          if (varFormat === 'percent' || varFormat === 'bps') {
            varPct = varVal; // decimal fraction
          } else if (varFormat === 'currency') {
            const base = (compVal != null && compVal !== 0) ? Math.abs(compVal) : (card.value ? Math.abs(card.value) : 0);
            varPct = base ? varVal / base : (varVal > 0 ? 0.1 : varVal < 0 ? -0.1 : 0);
          } else if (varFormat === 'count') {
            const base = (compVal != null && compVal !== 0) ? Math.abs(compVal) : (card.value ? Math.abs(card.value) : 0);
            varPct = base ? varVal / base : (varVal > 0 ? 0.1 : varVal < 0 ? -0.1 : 0);
          }
          const cls = heatmapClass(varPct);

          // Display variance using bps/currency/count rules
          let cellText;
          if (varFormat === 'percent' || varFormat === 'bps') {
            cellText = formatBps(varVal);
          } else if (varFormat === 'currency') {
            cellText = formatCurrency(varVal, 1, true);
          } else if (varFormat === 'count') {
            cellText = formatCount(varVal, true);
          } else {
            cellText = fmtVal(varVal, varFormat, { forceSign: true });
          }
          // Prepend non-color cue (triangle) for colorblind redundancy
          const cellArrow = varArrow(varVal);
          cellText = cellArrow + cellText;

          // Period-aware actual: prefer tracker actual, fall back to card value
          const actualDyn = (d && d.actual != null) ? d.actual : card.value;
          const actualStr = fmtVal(actualDyn, varFormat || card.valueKind);
          const compStr = compVal != null ? fmtVal(compVal, varFormat) : '-';
          const tip = `${esc(brand.shortLabel)} - ${esc(k)}: Actual ${actualStr} | ${esc(compareLabel())} ${compStr} | Var ${cellText}`;
          return `<td class="${cls}" title="${tip}">${cellText}</td>`;
        }).join('');
        return `<tr><td style="font-weight:700">${esc(brand.shortLabel)}</td>${cells}</tr>`;
      }).join('');

      const legend = `
        <div class="heatmap-legend" role="note" aria-label="Heatmap legend">
          <span class="hl-item"><span class="hl-swatch" style="background:var(--beat)"></span>Strong Beat</span>
          <span class="hl-sep">|</span>
          <span class="hl-item"><span class="hl-swatch" style="background:var(--beat-bg)"></span>Mild Beat</span>
          <span class="hl-sep">|</span>
          <span class="hl-item"><span class="hl-swatch" style="background:var(--bg-card)"></span>Flat</span>
          <span class="hl-sep">|</span>
          <span class="hl-item"><span class="hl-swatch" style="background:var(--miss-bg)"></span>Mild Miss</span>
          <span class="hl-sep">|</span>
          <span class="hl-item"><span class="hl-swatch" style="background:var(--miss)"></span>Strong Miss</span>
        </div>
      `;

      const periodLbl = periodLabelFor(state.trackerView);
      return `
        <div class="kicker">Cross-segment variance &mdash; ${esc(periodLbl)}</div>
        <div class="sec">
          <div class="heatmap-band-wrap">
            <div class="band">HEATMAP &mdash; VARIANCE vs ${esc(compareLabel()).toUpperCase()}</div>
            <span class="heatmap-compare-chip" title="Controlled by the compare toggle in the toolbar">PERIOD <strong>${esc(periodLbl.toUpperCase())}</strong> &middot; VS <strong>${esc(compareLabel().toUpperCase())}</strong></span>
          </div>
          <div class="box">
            ${legend}
            <div class="wrap">
              <table class="heatmap-table">
                <thead><tr><th style="text-align:left">Segment</th>${headerCells}</tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    /* ======================================= */
    /* === CONSOLIDATED VIEW               === */
    /* ======================================= */
    function renderConsolidated() {
      const panel = qs('#tab-consolidated');
      const segEntries = Object.entries(data.segments);

      let totalAOI = 0, totalAOIVar = 0, totalNRG = 0, totalFzSales = 0;
      segEntries.forEach(([, seg]) => {
        const aoiCard = seg.kpis.summaryCards.find(c => c.label === 'AOI');
        const nrgCard = seg.kpis.summaryCards.find(c => c.label === 'NRG');
        const fzSales = seg.fzSales || 0;
        // Period-aware AOI: read from tracker row for active trackerView
        if (aoiCard) {
          const aoiRow = findTrackerRowForCard(seg, aoiCard);
          const aoiD = getTrackerPeriodData(aoiRow);
          if (aoiD && aoiD.actual != null) {
            totalAOI += aoiD.actual;
            const aoiVar = computeVar(aoiD);
            totalAOIVar += (aoiVar || 0);
          } else {
            totalAOI += (aoiCard.value || 0);
            totalAOIVar += (aoiCard.badgeValue || 0);
          }
        }
        // Period-aware NRG
        if (nrgCard) {
          const nrgRow = findTrackerRowForCard(seg, nrgCard);
          const nrgD = getTrackerPeriodData(nrgRow);
          if (nrgD && nrgD.actual != null) {
            totalNRG += nrgD.actual;
          } else {
            totalNRG += (nrgCard.value || 0);
          }
        }
        totalFzSales += fzSales;
      });
      const aoiMargin = totalFzSales ? totalAOI / totalFzSales : 0;

      // Segment AOI sparkline cards
      const segCards = segEntries.map(([id, seg]) => {
        const brand = getBrand(id);
        const aoiCard = seg.kpis.summaryCards.find(c => c.label === 'AOI');
        const aoiRow = aoiCard ? findTrackerRowForCard(seg, aoiCard) : null;
        const aoiD = getTrackerPeriodData(aoiRow);
        const aoiActualDyn = (aoiD && aoiD.actual != null) ? aoiD.actual : (aoiCard ? aoiCard.value : null);
        const aoiVarDyn = (aoiD && aoiD.actual != null) ? computeVar(aoiD) : (aoiCard ? aoiCard.badgeValue : null);
        const varBadge = aoiVarDyn != null
          ? `<span class="${tileBadgeCls(aoiVarDyn)}" style="font-size:11px;background:#FFFFFF;color:${aoiVarDyn >= 0 ? 'var(--beat)' : 'var(--miss)'};font-weight:800;box-shadow:0 1px 2px rgba(0,0,0,0.18)">${varArrow(aoiVarDyn)}${formatCurrency(aoiVarDyn, 1, true)}</span>`
          : '';
        const hist = aoiCard && aoiCard.history && aoiCard.history.length ? aoiCard.history : null;
        const startVal = hist ? fmtVal(hist[0], 'currency') : '-';
        const endVal = hist ? fmtVal(hist[hist.length - 1], 'currency') : '-';
        const ctxSubtitle = `${periodLabelFor(state.trackerView)} vs ${compareLabel()}`;
        return `
          <div class="consol-card" data-seg="${id}" title="AOI Actuals P1\u2013P3 for ${esc(brand.shortLabel)}: start ${startVal}, end ${endVal}">
            <div class="consol-card-hdr" style="background:${brand.color}">
              <div style="display:flex;flex-direction:column;align-items:flex-start;line-height:1.1">
                <span>${esc(brand.shortLabel)}</span>
                <span style="font-style:italic;font-size:9px;font-weight:400;opacity:0.85">${esc(ctxSubtitle)}</span>
              </div>
              <span style="font-weight:400;font-size:13px">${aoiActualDyn != null ? fmtVal(aoiActualDyn, 'currency') : '-'} ${varBadge}</span>
            </div>
            <div class="consol-spark">
              <canvas id="spark-consol-${id}"></canvas>
              <div class="consol-spark-axis"><span>${startVal}</span><span>${endVal}</span></div>
            </div>
            <div class="consol-spark-caption">AOI Actuals P1\u2013P3 ($M)</div>
          </div>
        `;
      }).join('');

      panel.innerHTML = `
        <div class="kicker">The headline &mdash; portfolio totals at a glance</div>
        <div class="row" style="margin-bottom:16px">
          <article class="card" style="border-left-color:var(--brand);flex:1 1 200px;min-width:200px" data-static="1">
            <div class="sl">TOTAL AOI</div>
            <div class="kv">${formatCurrency(totalAOI)}</div>
            <div class="ks"><span class="${tileBadgeCls(totalAOIVar)}">${varArrow(totalAOIVar)}${formatCurrency(totalAOIVar, 1, true)} vs ${esc(compareLabel())}</span></div>
          </article>
          <article class="card" style="border-left-color:var(--miss);flex:1 1 200px;min-width:200px" data-static="1">
            <div class="sl">TOTAL NRG</div>
            <div class="kv">${formatCount(totalNRG)}</div>
            <div class="ks"><span style="color:var(--text-muted)">Net restaurants</span></div>
          </article>
          <article class="card" style="border-left-color:var(--brand);flex:1 1 200px;min-width:200px" data-static="1">
            <div class="sl">AOI MARGIN</div>
            <div class="kv">${formatPercent(aoiMargin)}</div>
          </article>
        </div>

        ${renderHeatmap(segEntries)}

        <div class="kicker">Profitability snapshot &mdash; click any segment to drill in</div>
        <div class="consol-grid" style="grid-template-columns:repeat(auto-fit, minmax(200px, 1fr))">${segCards}</div>
      `;

      requestAnimationFrame(() => {
        segEntries.forEach(([id, seg]) => {
          const canvas = qs(`#spark-consol-${id}`);
          if (!canvas) return;
          const aoiCard = seg.kpis.summaryCards.find(c => c.label === 'AOI');
          if (aoiCard && aoiCard.history) {
            drawSparkline(canvas, aoiCard.history, { color: getBrand(id).color });
          }
        });
      });

      qsa('.consol-card').forEach(card => {
        card.onclick = () => {
          state.activeBrand = card.dataset.seg;
          applyBrandColor();
          const seg = getSegment();
          state.activeTab = seg.tabs[0].id;
          renderAll();
        };
      });
    }

    /* ======================================= */
    /* === KPI PANEL                        === */
    /* ======================================= */
    function renderCards() {
      const seg = getSegment();
      if (!seg) return '';
      const fzSales = seg.fzSales || 0;
      return seg.kpis.summaryCards.map((card, i) => {
        const rag = ragClass(card);
        const drilled = state.drillTarget === i ? ' drilled' : '';
        // AOI Margin calculation note removed per spec
        let marginLine = '';

        // Dynamically compute compare + variance from the tracker row
        const trackerRow = findTrackerRowForCard(seg, card);
        const d = getTrackerPeriodData(trackerRow);
        let dynCompVal = null;
        let dynVarVal = null;
        let dynVarFormat = null;
        if (d && d.actual != null) {
          dynCompVal = getCompareVal(d);
          dynVarVal = computeVar(d);
          dynVarFormat = trackerRow.format || card.valueKind;
        }

        // Note (subtitle): "LE 11.1%" style -- dynamic when tracker data exists
        let noteHtml = '';
        if (dynCompVal != null) {
          const compStr = fmtVal(dynCompVal, dynVarFormat);
          noteHtml = `<span>${esc(compareLabelShort())} ${compStr}</span>`;
        } else if (card.note) {
          const shortLbl = compareLabelShort();
          noteHtml = `<span>${esc(state.compareMode === 'le' ? card.note.replace(/^LE:\s*/, 'LE ') : card.note.replace(/^LE:\s*/, shortLbl + ' '))}</span>`;
        }

        // Badge: computed variance (bps for percent, $ for currency, # for count)
        let badgeHtml = '';
        if (dynVarVal != null) {
          let badgeStr;
          if (dynVarFormat === 'percent' || dynVarFormat === 'bps') {
            badgeStr = formatBps(dynVarVal);
          } else if (dynVarFormat === 'currency') {
            badgeStr = formatCurrency(dynVarVal, 1, true);
          } else if (dynVarFormat === 'count') {
            badgeStr = formatCount(dynVarVal, true);
          } else {
            badgeStr = fmtVal(dynVarVal, dynVarFormat, { forceSign: true });
          }
          badgeHtml = `<span class="${tileBadgeCls(dynVarVal)}">${varArrow(dynVarVal)}${badgeStr}</span>`;
        } else if (card.badgeValue != null) {
          badgeHtml = `<span class="${tileBadgeCls(card.badgeValue)}">${varArrow(card.badgeValue)}${fmtVal(card.badgeValue, card.badgeKind, { forceSign: true })}</span>`;
        }

        return `
          <article class="card${drilled} ${rag}" style="border-left-color:${card.accent}" data-card-idx="${i}">
            <div class="sl">${esc(card.label)}</div>
            <div class="kv">${fmtVal(card.value, card.valueKind)}</div>
            <div class="card-badge-row" style="margin-top:10px;min-height:22px;display:flex;align-items:center">
              ${badgeHtml}
            </div>
            <div class="card-compare-row" style="margin-top:4px;min-height:16px;font-size:12px;color:var(--text-muted);font-weight:600;font-variant-numeric:tabular-nums">
              ${noteHtml}
            </div>
            ${marginLine}
            ${card.history ? (() => {
              const h = card.history;
              const startVal = fmtVal(h[0], card.valueKind);
              const endVal = fmtVal(h[h.length - 1], card.valueKind);
              return `<div class="card-spark"><canvas></canvas><div class="card-spark-caption"><span class="spark-end">${startVal}</span><span class="spark-label">P1\u2013P3 Actuals</span><span class="spark-end">${endVal}</span></div></div>`;
            })() : ''}
          </article>
        `;
      }).join('');
    }

    function renderDrillDown() {
      const seg = getSegment();
      if (state.drillTarget == null || !seg) return '';
      const card = seg.kpis.summaryCards[state.drillTarget];
      if (!card) return '';

      // Match tracker row by id first (e.g. card "SSS" -> r.id "sss"),
      // then fall back to label substring matching for labels like "Unit %" -> "Unit % (Net Growth %)"
      const cardKey = card.label.toLowerCase().replace(/[^a-z0-9]/g, '');
      const trackerRow = seg.kpis.tracker.rows.find(r => r.id === cardKey)
        || seg.kpis.tracker.rows.find(r => {
          const lbl = r.label.toLowerCase();
          const cardLbl = card.label.toLowerCase().replace(/[()%]/g, '').trim();
          return cardLbl && lbl.includes(cardLbl);
        });
      const hasTrackerData = trackerRow && trackerRow.detailSections && trackerRow.detailSections.length > 0;

      const views = seg.kpis.tracker.views || [];
      const hasMultiView = hasTrackerData && views.length > 1 &&
        views.every(v => { const d = trackerRow[v.id]; return d && d.actual != null; });

      const viewToggle = hasMultiView
        ? `<div class="tgs" style="margin-bottom:12px">${views.map(v =>
            `<button class="tg ${v.id === state.trackerView ? 'a' : ''}" data-kv="${v.id}">${esc(v.label)}</button>`
          ).join('')}</div>`
        : '';

      const activeView = hasMultiView ? views.find(v => v.id === state.trackerView) : null;
      const viewLabel = activeView ? activeView.label : '';

      let summaryHtml = '';
      if (hasTrackerData) {
        const d = trackerRow[state.trackerView] || {};
        const compVal = getCompareVal(d);
        const varVal = computeVar(d);
        const actualLabel = viewLabel ? `${viewLabel} ACTUAL` : 'ACTUAL';
        const cmpLabel = viewLabel ? `${viewLabel} ${compareLabel()}` : compareLabel();
        summaryHtml = `<div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px">
          <div><div class="sl">${esc(actualLabel)}</div><div style="font-size:24px;font-weight:700;line-height:1;letter-spacing:-0.01em;color:var(--text-primary);font-variant-numeric:tabular-nums">${fmtVal(d.actual, trackerRow.format)}</div></div>
          <div><div class="sl">${esc(cmpLabel)}</div><div style="font-size:24px;font-weight:700;line-height:1;letter-spacing:-0.01em;color:var(--text-muted);font-variant-numeric:tabular-nums">${fmtVal(compVal, trackerRow.format)}</div></div>
          <div><div class="sl">VARIANCE</div><div style="font-size:24px;font-weight:700;line-height:1;letter-spacing:-0.01em;font-variant-numeric:tabular-nums"><span class="${badgeCls(varVal)}">${varArrow(varVal)}${fmtVal(varVal, trackerRow.format, { forceSign: true })}</span></div></div>
        </div>`;
      }

      let detailHtml = '';
      if (hasTrackerData) {
        const thStyle = 'text-align:right;padding:6px 8px;border-bottom:2px solid var(--border-light);color:var(--text-muted);font-size:11px;font-weight:600;text-transform:uppercase';
        trackerRow.detailSections.forEach(section => {
          detailHtml += `<table style="width:100%;border-collapse:collapse;margin-bottom:10px">
            <thead><tr>
              <th style="text-align:left;padding:6px 8px;border-bottom:2px solid var(--border-light);color:var(--text-muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em">${esc(section.title)}</th>
              <th style="${thStyle}">Actual</th>
              <th style="${thStyle}">${esc(compareLabel())}</th>
              <th style="${thStyle}">Var</th>
            </tr></thead><tbody>`;
          section.rows.forEach(r => {
            const d = r[state.trackerView] || {};
            const comp = getCompareVal(d);
            const v = computeVar(d);
            const tdStyle = 'border-bottom:1px solid var(--border-light)';
            detailHtml += `<tr>
              <td style="text-align:left;padding:8px;font-weight:600;color:var(--text-primary);${tdStyle}">${esc(r.label)}</td>
              <td style="text-align:right;padding:8px;color:var(--text-primary);${tdStyle}">${fmtVal(d.actual, section.format)}</td>
              <td style="text-align:right;padding:8px;color:var(--text-muted);${tdStyle}">${fmtVal(comp, section.format)}</td>
              <td style="text-align:right;padding:8px;${tdStyle}"><span class="${badgeCls(v)}">${varArrow(v)}${fmtVal(v, section.format, { forceSign: true })}</span></td>
            </tr>`;
          });
          detailHtml += '</tbody></table>';
        });
      }

      const hasChart = card.history && card.history.length > 1;

      return `
        <div class="drill-panel">
          <div class="drill-header" style="background:${card.accent}">
            <span>${esc(card.label)} Detail</span>
            <button class="drill-close" id="drill-close" title="Close drill-down">Back</button>
          </div>
          <div class="drill-body"${!hasTrackerData && hasChart ? ' style="flex-direction:column"' : ''}>
            ${hasChart || hasTrackerData ? `<div class="drill-chart"${!hasTrackerData ? ' style="min-width:100%"' : ''}>
              ${viewToggle}
              ${summaryHtml}
              ${hasChart ? '<canvas id="drill-chart-canvas"></canvas>' : ''}
            </div>` : ''}
            ${hasTrackerData ? `<div class="drill-details">${detailHtml}</div>` : ''}
            ${!hasTrackerData && !hasChart ? '<p style="color:var(--text-muted);padding:20px">No detailed breakdown available for this metric.</p>' : ''}
          </div>
        </div>
      `;
    }

    function renderDrivers() {
      const seg = getSegment();
      if (!seg || !seg.kpis.drivers) return '';
      const drv = seg.kpis.drivers;
      const items = drv.items || [];
      const max = Math.max(...items.map(i => Math.abs(i.value)), 0);
      const wf = v => max ? `${(Math.abs(v) / max) * 100}%` : '0%';

      return `
        <div class="kicker">${esc(drv.kicker || 'Key Drivers')}</div>
        <section class="sec">
          <div class="band">${esc(drv.title)}</div>
          <div class="driver-shell"><div class="drv">
            ${items.map(item => `
              <div class="driver-row">
                <button class="driver-toggle" type="button" data-driver="${item.id}" aria-expanded="false">
                  <span class="driver-label-wrap"><span class="dt">${esc(item.label)}</span><span class="dac">&#9662;</span></span>
                  <div class="dtr"><div class="df" style="width:${wf(item.value)};background:${item.value >= 0 ? 'var(--beat)' : 'var(--miss)'}"></div></div>
                  <span class="dv">${varArrow(item.value)}${fmtVal(item.value, 'currency', { forceSign: true })}</span>
                </button>
                <div class="driver-detail" id="driver-${item.id}">
                  <div class="driver-body">${emphasize(item.why || '')}</div>
                </div>
              </div>
            `).join('')}
          </div></div>
        </section>
      `;
    }

    function renderFlowthrough() {
      const seg = getSegment();
      if (!seg || !seg.kpis.flowthrough) return '';
      const ft = seg.kpis.flowthrough;
      const rows = ft.rows || [];

      const tableRows = rows.map(r => {
        const totalCls = r.isTotal ? ' class="ft-total"' : '';
        const yoyStr = r.yoy != null ? formatCurrency(r.yoy, 1, true) : '-';
        const ftStr = r.flowthrough != null ? (r.flowthrough < 0 ? `(${Math.abs(r.flowthrough).toFixed(1)}%)` : `${r.flowthrough.toFixed(1)}%`) : '-';
        return `<tr${totalCls}>
          <td>${esc(r.label)}</td>
          <td>${yoyStr}</td>
          <td>${ftStr}</td>
        </tr>`;
      }).join('');

      return `
        <div class="kicker">Flowthrough Analysis</div>
        <section class="sec">
          <div class="band">Driver YoY Change &amp; Flowthrough Impact</div>
          <div class="box"><div class="wrap">
            <table class="ft-table">
              <thead><tr>
                <th style="text-align:left">Driver</th>
                <th>YoY ($M)</th>
                <th>Flowthrough (%)</th>
              </tr></thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div></div>
        </section>
      `;
    }

    function renderFxDecomp() {
      const seg = getSegment();
      if (!seg || !seg.fxDecomp || state.activeBrand !== 'intl') return '';
      const fx = seg.fxDecomp;
      const metrics = [
        { label: 'SSS', data: fx.sss, format: 'percent' },
        { label: 'AOI ($M)', data: fx.aoi, format: 'currency' },

      ];

        const fmtOrg = m.format === 'percent' ? formatPercent(m.data.organic) : m.format === 'currency' ? formatCurrency(m.data.organic) : formatCount(m.data.organic);
        const fmtFx = m.format === 'percent' ? formatPercent(m.data.fx) : m.format === 'currency' ? formatCurrency(m.data.fx) : formatCount(m.data.fx);
        const fmtRep = m.format === 'percent' ? formatPercent(m.data.reported) : m.format === 'currency' ? formatCurrency(m.data.reported) : formatCount(m.data.reported);

        <section class="sec">

          <div class="box"><div class="wrap">

                <th>FX Impact</th>
                <th>Reported</th>
              </tr></thead>
              <tbody>${fxRows}</tbody>
            </table>
          </div></div>
        </section>
      `;
    }

    /* ======================================= */
    /* === CONSOLIDATED FINANCIALS          === */
    /* ======================================= */
    function renderConsolidatedFinancials() {
      const segEntries = Object.entries(data.segments);
      const cmpLabel = compareLabel();

      function getFinCompare(row) {
        if (state.compareMode === 'le') return row.lePlan;
        if (state.compareMode === 'budget') return row.budget;
        if (state.compareMode === 'py') return row.pyActual;
        return row.lePlan;
      }
      function getFinVar(row) {
        const comp = getFinCompare(row);
        if (row.actualPlan == null || comp == null) return null;
        return row.actualPlan - comp;
      }

      /* --- Standard Chart of Accounts --- */
      const consolChart = [
        { key: 'fzSales',              label: 'FZ Sales',                  rowType: 'total',     match: ['fz sales'] },
        { key: 'royalties',            label: 'Royalties',                 rowType: 'sub',       match: ['royalties'] },
        { key: 'franchiseOtherFees',   label: 'FZ & Other Fees',           rowType: 'sub',       match: ['fz & successor fees','amortized fees','unamortized fees','fz & other fees','fz other fees','franchise & other fees'] },
        { key: 'totalFranchiseRev',    label: 'Total Franchise Revenue',   rowType: 'total',     match: ['total franchise revenue'] },
        { key: 'fzBadDebt',            label: 'FZ Bad Debt',               rowType: 'sub',       match: ['fz bad debt'] },
        { key: 'otherFzExpense',       label: 'Other FZ Expense',          rowType: 'sub',       match: ['other fz expense'] },
        { key: 'franchiseAOI',         label: 'Franchise AOI',             rowType: 'total',     match: ['franchise aoi'] },
        { key: 'propertyAOI',          label: 'Property AOI',              rowType: 'total',     match: ['property aoi'] },
        { key: 'adFundAOI',            label: 'Ad Fund AOI',               rowType: 'total',     match: ['ad fund aoi'] },
        { key: 'companyAOI',           label: 'Company AOI',               rowType: 'total',     match: ['company aoi'] },
        { key: 'otherOperatingAOI',    label: 'Other Operating AOI',       rowType: 'total',     match: ['tech fund aoi','supply chain','retail aoi','cpg / e-commerce','services & corporate','tpca','mis fees'] },
        { key: 'segmentGA',            label: 'Segment G&A',               rowType: 'total',     match: ['segment g&a','g&a'] },
        { key: 'otherCorp',            label: 'Other Corp',                rowType: 'total',     match: ['other corp'] },
        { key: 'totalAOI',             label: 'Total AOI',                 rowType: 'highlight', match: ['total aoi'] }
      ];

      /* Accumulate values across segments */
      const accum = {};
      consolChart.forEach(c => { accum[c.key] = { actualPlan: 0, lePlan: 0, budget: 0, pyActual: 0 }; });

      /* Track which segment rows have been claimed */
      segEntries.forEach(([id, seg]) => {
        if (!seg.financials || !seg.financials.rows) return;
        const claimed = new Set();
        seg.financials.rows.forEach(row => {
          if (row.isRate) return; // skip rate rows
          const lbl = row.label.toLowerCase().trim();
          let matched = false;
          for (const c of consolChart) {
            if (c.match.includes(lbl)) {
              accum[c.key].actualPlan += (row.actualPlan || 0);
              accum[c.key].lePlan     += (row.lePlan || 0);
              accum[c.key].budget     += (row.budget || 0);
              accum[c.key].pyActual   += (row.pyActual || 0);
              claimed.add(lbl);
              matched = true;
              break;
            }
          }
          /* Unclaimed non-highlight rows that look like operating items roll into Other Operating AOI */
          if (!matched && row.rowType !== 'highlight' && !claimed.has(lbl)) {
            /* Check if it is NOT already a known standard line */
            const isStandard = consolChart.some(c => c.match.includes(lbl));
            if (!isStandard) {
              accum['otherOperatingAOI'].actualPlan += (row.actualPlan || 0);
              accum['otherOperatingAOI'].lePlan     += (row.lePlan || 0);
              accum['otherOperatingAOI'].budget     += (row.budget || 0);
              accum['otherOperatingAOI'].pyActual   += (row.pyActual || 0);
            }
          }
        });
      });

      /* Build consolidated rows */
      let consolRows = consolChart.map(c => ({
        label: c.label,
        rowType: c.rowType,
        actualPlan: accum[c.key].actualPlan,
        lePlan: accum[c.key].lePlan,
        budget: accum[c.key].budget,
        pyActual: accum[c.key].pyActual
      }));

      /* Sort if needed */
      if (state.sortColumn) {
        const key = state.sortColumn;
        consolRows.sort((a, b) => {
          let va, vb;
          if (key === 'variance') { va = getFinVar(a) ?? 0; vb = getFinVar(b) ?? 0; }
          else if (key === 'compare') { va = getFinCompare(a) ?? 0; vb = getFinCompare(b) ?? 0; }
          else { va = a[key] ?? 0; vb = b[key] ?? 0; }
          return state.sortDir === 'asc' ? va - vb : vb - va;
        });
      }

      const arrow = (col) => {
        if (state.sortColumn !== col) return '';
        return `<span class="sort-arrow">${state.sortDir === 'asc' ? '\u25B2' : '\u25BC'}</span>`;
      };

      const consolTableRows = consolRows.map(row => {
        const cls = row.rowType === 'highlight' ? 'hi' : row.rowType === 'sub' ? 'sub' : 'tot';
        const comp = getFinCompare(row);
        const v = getFinVar(row);
        return `<tr class="${cls}">
          <td>${esc(row.label)}</td>
          <td>${fmtVal(row.actualPlan, 'currencyTable', { decimals: 1 })}</td>
          <td>${fmtVal(comp, 'currencyTable', { decimals: 1 })}</td>
          <td><span class="${badgeCls(v)}">${varArrow(v)}${fmtVal(v, 'currencyTable', { forceSign: true, decimals: 1 })}</span></td>
        </tr>`;
      }).join('');

      /* --- Segment Contribution table --- */
      const contribRows = segEntries.map(([id, seg]) => {
        const brand = getBrand(id);
        if (!seg.financials) return null;
        const hiRow = seg.financials.rows.find(r => r.rowType === 'highlight');
        if (!hiRow) return null;
        const comp = getFinCompare(hiRow);
        const v = (hiRow.actualPlan != null && comp != null) ? hiRow.actualPlan - comp : null;
        return { name: brand.shortLabel, actual: hiRow.actualPlan, variance: v };
      }).filter(Boolean);

      let contribTotActual = 0, contribTotVar = 0;
      contribRows.forEach(r => { contribTotActual += (r.actual || 0); contribTotVar += (r.variance || 0); });

      const contribHtml = contribRows.map(r => `<tr>
        <td style="font-weight:700">${esc(r.name)}</td>
        <td>${fmtVal(r.actual, 'currencyTable', { decimals: 1 })}</td>
        <td><span class="${badgeCls(r.variance)}">${varArrow(r.variance)}${fmtVal(r.variance, 'currencyTable', { forceSign: true, decimals: 1 })}</span></td>
      </tr>`).join('') + `<tr class="ft-total">
        <td style="font-weight:700">Total</td>
        <td>${fmtVal(contribTotActual, 'currencyTable', { decimals: 1 })}</td>
        <td><span class="${badgeCls(contribTotVar)}">${varArrow(contribTotVar)}${fmtVal(contribTotVar, 'currencyTable', { forceSign: true, decimals: 1 })}</span></td>
      </tr>`;

      qs('#tab-financials').innerHTML = `
        <div class="kicker">Consolidated P&amp;L &mdash; Line-by-Line &mdash; USD$ in M</div>
        <section class="sec">
          <div class="band">Actual vs ${esc(cmpLabel)} &mdash; ${esc(periodLabelFor('march'))} ${YEAR}</div>
          <div class="box"><div class="wrap">
            <table class="tbl" id="fin-table">
              <thead><tr>
                <th style="text-align:left;width:260px" data-sort="label">${arrow('label')}</th>
                <th data-sort="actualPlan">Actual${arrow('actualPlan')}</th>
                <th data-sort="compare">${esc(cmpLabel)}${arrow('compare')}</th>
                <th data-sort="variance">Variance${arrow('variance')}</th>
              </tr></thead>
              <tbody>${consolTableRows}</tbody>
            </table>
          </div></div>
        </section>
        <div style="margin-top:32px">
          <div class="kicker">Segment Contribution to Total AOI</div>
          <section class="sec">
            <div class="band">Segment Contribution &mdash; Total AOI &mdash; USD$ in M</div>
            <div class="box"><div class="wrap">
              <table class="tbl" style="min-width:520px">
                <thead><tr>
                  <th style="text-align:left;width:46%">Segment</th>
                  <th style="width:27%">Total AOI Actual</th>
                  <th style="width:27%">Variance vs ${esc(cmpLabel)}</th>
                </tr></thead>
                <tbody>${contribHtml}</tbody>
              </table>
            </div></div>
          </section>
        </div>
      `;
    }
